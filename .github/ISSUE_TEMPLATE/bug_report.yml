name: Bug report
description: Report a bug in tpt-healthcare-nz. This repository does not accept external pull requests — file an issue and a maintainer or internal agent will pick it up.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do **not** use this form to report a security vulnerability — see [SECURITY.md](../../SECURITY.md) for the disclosure process instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: Affected module/package
      description: e.g. core/nhi, modules/tpt-doctor, apps/tpt-clinic
    validations:
      required: false

  - type: input
    id: nz-domain
    attributes:
      label: Relevant NZ integration (if applicable)
      description: e.g. NHI, HPI, NES, ACC, PHARMAC, FHIR R5 resource type
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go/Node version, deployment mode (Docker / native), etc.
    validations:
      required: false
